<section class="page-hero">
  <div class="page-hero__content" appScrollReveal>
    <p class="section-label">Wedding Films</p>
    <h1>Stories that move you</h1>
    <p>Every couple deserves a film that makes them feel the magic all over again.</p>
  </div>
</section>

<section class="films-page">
  <div class="films-grid">
    @for (film of films; track film.id; let i = $index) {
      <article class="film-card card-hover" (click)="openFilm(film)" appScrollReveal [revealDelay]="(i % 3) * 100">
        <div class="film-card__thumb">
          <img [src]="film.thumbnailUrl" [alt]="film.title" loading="lazy" />
          <div class="film-card__play">
            <div class="play-btn">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
            </div>
          </div>
        </div>
        <div class="film-card__body">
          <h2 class="film-card__title">{{ film.title }}</h2>
          <p class="film-card__couple">{{ film.coupleNames }}</p>
          <p class="film-card__location">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            {{ film.location }}
          </p>
          <span class="film-card__year">{{ film.year }}</span>
        </div>
      </article>
    }
  </div>
</section>

@if (activeFilm()) {
  <app-film-modal [film]="activeFilm()!" (closed)="closeFilm()" />
}

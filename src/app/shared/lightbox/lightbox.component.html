<div class="lightbox__backdrop" (click)="onBackdropClick($event)" role="dialog" aria-modal="true" aria-label="Image lightbox">
  <div class="lightbox__container">
    <button class="lightbox__close" (click)="close()" aria-label="Close lightbox">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <button
      class="lightbox__arrow lightbox__arrow--prev"
      (click)="prev()"
      [disabled]="!hasPrev"
      aria-label="Previous image"
    >
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="lightbox__image-wrap">
      <img
        [src]="current.url"
        [alt]="current.alt"
        class="lightbox__image"
        loading="lazy"
        draggable="false"
        [ngStyle]="imageStyle()"
        (mousedown)="onMouseDown($event)"
      />
    </div>

    <button
      class="lightbox__arrow lightbox__arrow--next"
      (click)="next()"
      [disabled]="!hasNext"
      aria-label="Next image"
    >
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>

    <div class="lightbox__caption">
      <p class="lightbox__alt">{{ current.alt }}</p>
      <span class="lightbox__counter">{{ currentIndex() + 1 }} / {{ images.length }}</span>
    </div>
  </div>
</div>

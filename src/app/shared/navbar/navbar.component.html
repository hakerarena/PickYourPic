<nav class="navbar" [ngClass]="{ scrolled: isScrolled() }">
  <div class="navbar__inner">
    <a class="navbar__logo" routerLink="/" (click)="closeMenu()">
      <img
        [src]="brand.logoUrl"
        [alt]="brand.logoAlt"
        class="navbar__logo-img"
        width="110"
        height="38"
      />
    </a>

    <button
      class="navbar__hamburger"
      [ngClass]="{ open: menuOpen() }"
      (click)="toggleMenu()"
      aria-label="Toggle navigation menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="navbar__links" [ngClass]="{ open: menuOpen() }">
      @for (item of navItems; track item.path) {
        <li>
          <a
            [routerLink]="item.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.path === '/' }"
            (click)="closeMenu()"
          >{{ item.label }}</a>
        </li>
      }
      <li class="navbar__cta">
        <a routerLink="/contact" class="btn-primary" (click)="closeMenu()">Book Now</a>
      </li>
    </ul>
  </div>
</nav>
